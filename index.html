<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IoT & AI - Universitas Negeri Malang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #e2e8f0; }
        .card-custom { transition: all 0.3s ease; }
        .card-custom:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-64 bg-[#1e1e1e] border-r border-slate-800 flex flex-col hidden md:flex">
        <div class="p-6 text-center border-b border-slate-800">
            <h2 class="font-bold text-sm">Sistem Informasi Terpadu</h2>
            <p class="text-[10px] text-slate-500 mt-1">UNIVERSITAS NEGERI MALANG</p>
        </div>
        <nav class="p-4 space-y-2">
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="w-full text-left p-3 bg-blue-900/30 text-blue-400 rounded-lg text-sm">
                <i class="fas fa-desktop mr-2"></i> Dashboard
            </button>
            <button onclick="switchView('ai')" id="nav-ai" class="w-full text-left p-3 text-slate-400 hover:bg-slate-800 rounded-lg text-sm">
                <i class="fas fa-robot mr-2"></i> Analisis AI & CSV
            </button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        
        <div id="view-dashboard" class="block">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Dashboard Real-time</h1>
                <button class="bg-slate-800 px-4 py-2 rounded-lg text-sm border border-slate-700 hover:bg-slate-700"><i class="fas fa-download mr-2"></i> Export CSV</button>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl mb-6 flex items-center text-sm">
                <div class="w-3 h-3 bg-green-500 rounded-full mr-3 animate-pulse"></div>
                Supabase Terhubung secara Real-time
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                <div class="bg-[#1e1e1e] p-6 rounded-xl border border-slate-800 text-center card-custom">
                    <i class="fas fa-thermometer-half text-orange-400 mb-2"></i>
                    <div class="text-[10px] text-slate-400">SUHU UDARA</div>
                    <div class="text-lg font-bold mt-1"><span id="valSuhu">--</span> °C</div>
                </div>
                <div class="bg-[#1e1e1e] p-6 rounded-xl border border-slate-800 text-center card-custom">
                    <i class="fas fa-tint text-blue-400 mb-2"></i>
                    <div class="text-[10px] text-slate-400">KELEMBAPAN</div>
                    <div class="text-lg font-bold mt-1"><span id="valKelembapan">--</span> %</div>
                </div>
                <div class="bg-[#1e1e1e] p-6 rounded-xl border border-slate-800 text-center card-custom">
                    <i class="fas fa-leaf text-green-400 mb-2"></i>
                    <div class="text-[10px] text-slate-400">KEL. TANAH</div>
                    <div class="text-lg font-bold mt-1"><span id="valTanah">--</span> %</div>
                </div>
                <div class="bg-[#1e1e1e] p-6 rounded-xl border border-slate-800 text-center card-custom">
                    <i class="fas fa-water text-cyan-400 mb-2"></i>
                    <div class="text-[10px] text-slate-400">KADAR TDS</div>
                    <div class="text-lg font-bold mt-1"><span id="valTds">--</span> PPM</div>
                </div>
                <div class="bg-[#1e1e1e] p-6 rounded-xl border border-slate-800 text-center card-custom">
                    <i class="fas fa-ruler-vertical text-purple-400 mb-2"></i>
                    <div class="text-[10px] text-slate-400">JARAK AIR</div>
                    <div class="text-lg font-bold mt-1"><span id="valJarak">--</span> cm</div>
                </div>
                <div class="bg-[#1e1e1e] p-6 rounded-xl border border-slate-800 text-center card-custom">
                    <i class="fas fa-flask text-yellow-400 mb-2"></i>
                    <div class="text-[10px] text-slate-400">NILAI PH</div>
                    <div class="text-lg font-bold mt-1"><span id="valPh">--</span></div>
                </div>
            </div>
        </div>

        <div id="view-ai" class="hidden h-[calc(100vh-8rem)] flex flex-col">
            <div class="bg-[#1e1e1e] rounded-xl border border-slate-800 p-4 md:p-6 flex-1 flex flex-col min-h-0">
                <h2 class="text-lg font-bold mb-3 flex items-center">
                    <i class="fas fa-robot mr-2 text-blue-400"></i> AI Assistant Pertanian
                </h2>
                
                <div id="chatArea" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 min-h-0 border-b border-slate-800/50 pb-4">
                    </div>
                
                <div class="flex items-center gap-2 bg-[#252525] rounded-full p-2 border border-slate-700 focus-within:border-blue-500 transition-colors">
                    <input type="text" id="chatInput" class="flex-1 bg-transparent px-3 py-2 outline-none text-sm w-full" placeholder="Tanya sesuatu tentang data sensor saat ini...">
                    <button onclick="sendMessage()" class="p-2 text-blue-400 hover:text-blue-300 transition-colors flex items-center justify-center mr-2">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    <script src="app.js"></script>

    <script>
  async function testAI() {
    const response = await fetch("https://kkn-tanianteng.vercel.app/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: "Tes koneksi",
        sensorData: { suhu: 30 }
      })
    });
    const data = await response.json();
    console.log(data);
    alert("Jawaban AI: " + data.reply);
  }
</script>

</body>
</html>
